<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>To-Do List Application</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }\n        .container { max-width: 600px; margin: auto; }\n        input[type='text'] { width: 70%; padding: 10px; }\n        button { padding: 10px; }\n        .todo-item { display: flex; justify-content: space-between; margin: 5px 0; }\n        .completed { text-decoration: line-through; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>To-Do List</h1>\n        <input type="text" id="todo-input" placeholder="Add a new task...">\n        <button id="add-btn">Add</button>\n        <div id="todo-list"></div>\n        <h3>Statistics</h3>\n        <div id="stats"></div>\n    </div>\n    <script>\n        const todoInput = document.getElementById('todo-input');\n        const addBtn = document.getElementById('add-btn');\n        const todoList = document.getElementById('todo-list');\n        const stats = document.getElementById('stats');\n        let todos = JSON.parse(localStorage.getItem('todos')) || [];\n\n        function renderTodos() {\n            todoList.innerHTML = '';\n            todos.forEach((todo, index) => {\n                const todoItem = document.createElement('div');\n                todoItem.className = 'todo-item' + (todo.completed ? ' completed' : '');\n                todoItem.innerHTML = `\n                    <span>${todo.text} (Priority: ${todo.priority})</span>\n                    <div>\n                        <button onclick="editTodo(${index})">Edit</button>\n                        <button onclick="deleteTodo(${index})">Delete</button>\n                    </div>\n                `;\n                todoList.appendChild(todoItem);\n            });\n            updateStats();\n        }\n\n        function updateStats() {\n            const total = todos.length;\n            const completed = todos.filter(todo => todo.completed).length;\n            stats.innerHTML = `Total: ${total}, Completed: ${completed}`;\n        }\n\n        function addTodo() {\n            const text = todoInput.value;\n            const priority = prompt('Set priority (1-5):');\n            if (text && priority) {\n                todos.push({ text, priority, completed: false });\n                localStorage.setItem('todos', JSON.stringify(todos));\n                renderTodos();\n            }\n            todoInput.value = '';\n        }\n\n        function editTodo(index) {\n            const todo = todos[index];\n            todoInput.value = todo.text;\n            const newPriority = prompt('Set new priority (1-5):', todo.priority);\n            if (newPriority) {\n                todo.text = todoInput.value;\n                todo.priority = newPriority;\n                localStorage.setItem('todos', JSON.stringify(todos));\n                renderTodos();\n            }\n        }\n\n        function deleteTodo(index) {\n            todos.splice(index, 1);\n            localStorage.setItem('todos', JSON.stringify(todos));\n            renderTodos();\n        }\n\n        addBtn.addEventListener('click', addTodo);\n        renderTodos();\n    </script>\n</body>\n</html>
